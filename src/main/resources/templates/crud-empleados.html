<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Title</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body>
	<h1 style="text-align: center; font-family: Courier New, monospace; font-size: 50px;">Mantenimiento Empleados</h1>
	<br>
	<div style="font-family: Courier New, monospace;" class="d-flex">
		<div class="card col-sm-4">
			<div class="card-body">
				
				<form action="/empleado/agregar" method="post" th:object="${empleado}">
				    <input style="display: none" type="text" name="idEmpleado" id="idEmpleado" class="form-control" th:field="*{idEmpleado}">
				    <div class="form-group">
				        <label for="txtDni">Dni</label> 
				        <input type="text" id="txtDni" name="dni" class="form-control" th:field="*{dni}">
				    </div>
				    <div class="form-group">
				        <label for="txtNombre">Nombres</label> 
				        <input type="text" id="txtNombre" name="nom" class="form-control" th:field="*{nom}">
				    </div>
				    <div class="form-group">
				        <label for="txtApellido">Apellidos</label> 
				        <input type="text" id="txtApellido" name="ape" class="form-control" th:field="*{ape}">
				    </div>
				    <div class="form-group">
				        <label for="txtTelefono">Telefono</label> 
				        <input type="text" id="txtTelefono" name="tel" class="form-control" th:field="*{tel}">
				    </div>
				    <div class="form-group">
				        <label for="cboTipo">Tipo</label> 
				        <select id="cboTipo" name="objTipo" class="form-control" th:field="*{objTipo}">
				            <option value="-1">Seleccione...</option>
				            <option th:each="t : ${lstTipo}" th:value="${t.idTipo}" th:text="${t.descrip}"></option>
				        </select>
				    </div>
				    <div class="form-group">
				        <label for="txtUser">User</label> 
				        <input id="txtUser" type="text" name="user" class="form-control" th:field="*{user}">
				    </div>
				    <div class="form-group">
				        <label for="txtPass">Clave</label> 
				        <input id="txtPass" type="password" name="clave" class="form-control" th:field="*{clave}">
				    </div>
				    <button type="submit" class="btn btn-info">Agregar</button>
				    <button type="submit" class="btn btn-success">Actualizar</button>
				</form>
				
			</div>
		</div>
		<div class="col-sm-8">
			<table class="table table-hover">
				<thead class="thead-dark">
					<tr>
						<th></th>
						<th>DNI</th>
						<th>NOMBRES</th>
						<th>APELLIDOS</th>
						<th>TELEFONO</th>
						<th>TIPO</th>
						<th>USER</th>
						<th>CLAVE</th>
						<th>ACCIONES</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="e : ${lstEmpleado}">
						<th scope="row" th:text="${e.idEmpleado}"></th>
						<td th:text="${e.dni}"></td>
						<td th:text="${e.nom}"></td>
						<td th:text="${e.ape}"></td>
						<td th:text="${e.tel}"></td>
						<td th:text="${e.objTipo.descrip}"></td>
						<td th:text="${e.user}"></td>
						<td th:text="${e.clave}"></td>
						<td>
							<div style="display: flex">
								<form method="get" th:action="@{/cargaActualizarEmpleado}">
									<input type="hidden" name="idEmpleado"
										th:value="${e.idEmpleado}">
									<button style="border: none; position: relative;">
										<i class="bi bi-pencil-square"></i>
									</button>
								</form>

								<form method="get" th:action="@{/eliminarEmpleado}">
									<input type="hidden" name="idEmpleado"
										th:value="${e.idEmpleado}">
									<button style="border: none; margin-top: -30px; right: 55px;">
										<i class="bi bi-trash"></i>
									</button>
								</form>
								
								
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>





	<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
		integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
		crossorigin="anonymous">

</script>
	<script
		src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
		integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
		crossorigin="anonymous">

</script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
		integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
		crossorigin="anonymous">

</script>
</body>
</html>
